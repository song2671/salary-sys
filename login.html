<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工资管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">工资管理系统</h1>
        <p class="text-gray-500 mt-2">请登录以继续</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
          <input
            type="text"
            id="username"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
            placeholder="请输入用户名"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
          <div class="relative">
            <input
              type="password"
              id="password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition pr-12"
              placeholder="请输入密码"
              required
            />
            <button
              type="button"
              id="togglePassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
            </button>
          </div>
        </div>

        <div id="errorMsg" class="hidden text-red-500 text-sm text-center bg-red-50 py-2 rounded-lg"></div>

        <button
          type="submit"
          class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition-colors"
        >
          登 录
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-gray-500">
        <p>默认管理员：admin / admin123</p>
      </div>
    </div>

    <script>
      // 默认管理员账户
      const DEFAULT_USERS = [
        { username: 'admin', password: 'admin123', name: '系统管理员', role: 'admin' }
      ];

      // 切换密码可见性
      document.getElementById('togglePassword').addEventListener('click', function() {
        const pwd = document.getElementById('password');
        if (pwd.type === 'password') {
          pwd.type = 'text';
        } else {
          pwd.type = 'password';
        }
      });

      // 登录表单提交
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');

        // 获取已注册用户
        const users = JSON.parse(localStorage.getItem('salary_users') || '[]');
        const allUsers = [...DEFAULT_USERS, ...users];

        // 查找用户
        const user = allUsers.find(u => u.username === username && u.password === password);

          if (user) {
          // 登录成功
          sessionStorage.setItem('salary_logged_in', 'true');
          sessionStorage.setItem('salary_user', JSON.stringify({
            username: user.username,
            name: user.name,
            role: user.role
          }));
          window.location.href = './index.html';
        } else {
          // 登录失败
          errorMsg.textContent = '用户名或密码错误';
          errorMsg.classList.remove('hidden');
        }
      });
    </script>
  </body>
</html>
